<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-content">
                <div class="bot-icon">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="header-text">
                    <h1>FAQ Assistant</h1>
                    <p>Online • Ready to help</p>
                </div>
            </div>
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <!-- Chat Messages -->
        <div class="chat-container" id="chatContainer">
            <div class="messages" id="messages">
                <!-- Welcome Message -->
                <div class="message bot-message">
                    <div class="message-content">
                        <div class="avatar">
                            <i class="fas fa-robot"></i>
                        </div>
                        <div class="message-text">
                            <p>👋 Hello! I'm your FAQ Assistant. How can I help you today?</p>
                            <div class="suggestions">
                                <span>Try asking about:</span>
                                <div class="suggestion-chips">
                                    <button class="chip" data-question="What is your return policy?">Return Policy</button>
                                    <button class="chip" data-question="How long does shipping take?">Shipping</button>
                                    <button class="chip" data-question="What payment methods do you accept?">Payments</button>
                                    <button class="chip" data-question="Do you have a loyalty program?">Loyalty Program</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Typing Indicator -->
            <div class="typing-indicator hidden" id="typingIndicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <div class="input-container">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="Type your question here..."
                    autocomplete="off"
                    class="chat-input"
                >
                <button class="send-btn" id="sendBtn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div class="input-footer">
                <span>FAQ Assistant • <i class="fas fa-shield-alt"></i> Your questions are private</span>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
